<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Přehled tarifů — přístup kódem</title>
<style>
:root{
  --plane:#f9f9f7; --surface:#fcfcfb; --ink:#0b0b0b; --ink2:#52514e; --muted:#898781;
  --grid:#e1e0d9; --axis:#c3c2b7; --border:rgba(11,11,11,0.10);
  --series:#2a78d6; --series-fill:rgba(42,120,214,0.12);
  --warning:#fab219; --critical:#d03b3b; --warning-inink:#9a6b00; --critical-inink:#b02a2a;
}
@media (prefers-color-scheme:dark){:root{
  --plane:#0d0d0d; --surface:#1a1a19; --ink:#fff; --ink2:#c3c2b7; --muted:#898781;
  --grid:#2c2c2a; --axis:#383835; --border:rgba(255,255,255,0.10);
  --series:#3987e5; --series-fill:rgba(57,135,229,0.16);
  --warning:#fab219; --critical:#e05a5a; --warning-inink:#f0c14b; --critical-inink:#f08a8a;
}}
*{box-sizing:border-box} html,body{margin:0}
body{background:var(--plane); color:var(--ink); font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
  font-size:15px; line-height:1.5; padding:32px 20px 80px}
.wrap{max-width:900px; margin:0 auto}
h1{font-size:24px; margin:0 0 4px; letter-spacing:-0.02em}
.sub{color:var(--ink2); margin:0 0 4px} .tag{font-size:12px; color:var(--muted)}
svg{display:block; width:100%; height:auto; overflow:visible}

/* zámek */
.lock{max-width:420px; margin:8vh auto 0; text-align:center}
.lock .card{background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px 26px;
  box-shadow:0 12px 40px rgba(0,0,0,.12)}
.lock h1{font-size:22px} .lock p{color:var(--ink2); font-size:14px; margin:6px 0 20px}
.lock input{width:100%; font-size:18px; text-align:center; letter-spacing:.12em; padding:12px 14px;
  border:1px solid var(--border); border-radius:10px; background:var(--plane); color:var(--ink); font-family:inherit}
.lock input:focus{outline:2px solid var(--series); border-color:var(--series)}
.lock button{margin-top:14px; width:100%; appearance:none; border:0; background:var(--series); color:#fff;
  font-size:15px; font-weight:600; padding:12px; border-radius:10px; cursor:pointer; font-family:inherit}
.lock button:disabled{opacity:.6; cursor:default}
.lock .err{color:var(--critical-inink); font-size:13.5px; margin-top:12px; min-height:18px}
.lock .hint{font-size:12px; color:var(--muted); margin-top:16px}

.chart-card{background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px}
.head{display:flex; justify-content:space-between; align-items:baseline; gap:10px; flex-wrap:wrap}
.name{font-size:20px; font-weight:650} .num{color:var(--ink2); font-variant-numeric:tabular-nums}
.tarif{color:var(--muted); font-size:13px}
.stats{display:flex; gap:18px; margin:12px 0 0; font-size:13px; color:var(--ink2)}
.stats b{color:var(--ink); font-weight:650; font-variant-numeric:tabular-nums}
.cause{margin-top:14px; font-size:13.5px; padding:10px 12px; border-radius:10px;
  background:color-mix(in srgb, var(--critical) 8%, var(--surface)); border:1px solid var(--border)}
.cause.info{background:var(--surface); color:var(--ink2)}
h2{font-size:17px; margin:32px 0 12px}
table{border-collapse:collapse; width:100%; font-size:13.5px; background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden}
th,td{padding:9px 12px; text-align:right; white-space:nowrap} th{color:var(--ink2); font-weight:600; font-size:12.5px; border-bottom:1px solid var(--border)}
td.l,th.l{text-align:left} tbody tr:not(:last-child) td{border-bottom:1px solid var(--grid)} tbody td{font-variant-numeric:tabular-nums}
.grp td{background:var(--plane); color:var(--muted); text-transform:uppercase; font-size:12px; letter-spacing:.04em; font-weight:600; text-align:left}
tfoot td{border-top:2px solid var(--axis); font-weight:700; font-variant-numeric:tabular-nums}
.cc{color:var(--critical-inink); font-weight:700} .cw{color:var(--warning-inink); font-weight:650} .off{color:var(--muted)}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; margin-top:14px}
.ncard{background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px 14px 10px}
.ncard.fl{border-color:color-mix(in srgb, var(--critical) 45%, var(--border))}
.ncard .nm{font-weight:650} .ncard .nn{color:var(--ink2); font-size:12px; font-variant-numeric:tabular-nums}
.alerts{display:flex; flex-direction:column; gap:10px}
.arow{display:flex; gap:12px; padding:12px 14px; border:1px solid var(--border); border-radius:10px; background:var(--surface); align-items:flex-start}
.arow .ic{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:800;font-size:13px;flex:0 0 auto;margin-top:1px}
.arow.c .ic{background:var(--critical)} .arow.w .ic{background:var(--warning); color:#3a2c00}
.arow.arch{opacity:.66} .arow.arch .ic{background:var(--muted)}
.arow .side{margin-left:auto; display:flex; flex-direction:column; align-items:flex-end; gap:4px}
.arow .amt{font-weight:650; font-variant-numeric:tabular-nums; white-space:nowrap}
.mini-btn{border:1px solid var(--border); background:var(--surface); color:var(--ink2); font-size:11.5px; padding:4px 10px; border-radius:8px; cursor:pointer; font-family:inherit; white-space:nowrap}
.mini-btn:hover{color:var(--ink); border-color:var(--muted)}
.arch-box{border:1px solid var(--border); border-radius:12px; background:var(--surface); padding:10px 16px; margin-top:12px}
.arch-box summary{cursor:pointer; font-size:13px; color:var(--ink2); font-weight:600; list-style:none; user-select:none}
.arch-box summary::-webkit-details-marker{display:none}
.arch-box summary::before{content:'▸'; color:var(--muted); margin-right:6px}
.arch-box[open] summary::before{content:'▾'}
.cc.arch, .cw.arch{color:var(--muted); font-weight:400}
.unit{font-size:11px; color:var(--muted); text-align:right; margin-top:2px}
footer{color:var(--muted); font-size:12px; margin-top:40px; text-align:center}
.topbar{display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:10px}
.lockbtn{appearance:none; border:1px solid var(--border); background:var(--surface); color:var(--ink2);
  font-size:12.5px; padding:6px 12px; border-radius:9px; cursor:pointer; font-family:inherit}
.badge{font-size:10px; margin-left:4px}
.zoomable{cursor:zoom-in; position:relative}
.zoomhint{position:absolute; top:8px; right:8px; z-index:2; font-size:11.5px; color:var(--ink2);
  background:var(--surface); border:1px solid var(--border); border-radius:999px; padding:3px 9px; opacity:0; transition:opacity .12s; pointer-events:none}
.zoomable:hover .zoomhint{opacity:1}
.modal{position:fixed; inset:0; z-index:50; display:grid; place-items:center; padding:24px; background:rgba(0,0,0,.55); backdrop-filter:blur(3px)}
.modal[hidden]{display:none}
.modal-card{background:var(--surface); border:1px solid var(--border); border-radius:16px; width:min(860px,100%); max-height:92vh; overflow:auto; box-shadow:0 24px 70px rgba(0,0,0,.4)}
.modal-head{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:18px 20px 6px}
.modal-title{font-size:18px; font-weight:650}
.modal-title .m-num{color:var(--ink2); font-weight:500; font-size:14px; margin-left:8px; font-variant-numeric:tabular-nums}
.modal-chart{padding:6px 18px 4px}
.modal-foot{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:8px 20px 20px; flex-wrap:wrap}
.modal-sub{font-size:13px; color:var(--ink2)} .modal-sub b{color:var(--ink); font-variant-numeric:tabular-nums}
.modal-actions{display:flex; gap:10px; flex-wrap:wrap}
.btn{appearance:none; border:1px solid var(--border); background:var(--series); color:#fff; font-size:13.5px; font-weight:600; padding:9px 16px; border-radius:10px; cursor:pointer; font-family:inherit}
.btn:hover{filter:brightness(1.06)} .btn.ghost{background:transparent; color:var(--ink2)}
.icon-btn{appearance:none; border:1px solid var(--border); background:var(--surface); color:var(--ink2); width:34px; height:34px; border-radius:9px; cursor:pointer; font-size:16px; font-family:inherit}
.icon-btn:hover{color:var(--ink)}
</style>
</head>
<body>
<div class="wrap">
  <!-- ZÁMEK -->
  <div class="lock" id="lock">
    <div class="card">
      <h1>🔒 Přehled tarifů</h1>
      <p>Zadejte své heslo.</p>
      <form id="lock-form" autocomplete="off">
        <input id="code" type="password" autocomplete="off" placeholder="heslo" aria-label="Heslo">
        <button id="unlock-btn" type="submit">Zobrazit</button>
      </form>
      <div class="err" id="err"></div>
      <div class="hint">Heslo jste dostali od správce.<br>Uvidíte jen údaje ke svému číslu.</div>
    </div>
  </div>

  <!-- VÝSTUP -->
  <div id="view" hidden></div>
  <footer id="foot" hidden></footer>
</div>

<!-- MODAL: zvětšený graf + export -->
<div class="modal" id="modal" hidden>
  <div class="modal-card" role="dialog" aria-modal="true">
    <div class="modal-head">
      <div class="modal-title" id="modal-title"></div>
      <button class="icon-btn" id="modal-close" aria-label="Zavřít">✕</button>
    </div>
    <div class="modal-chart" id="modal-chart"></div>
    <div class="modal-foot">
      <div class="modal-sub" id="modal-sub"></div>
      <div class="modal-actions">
        <button class="btn ghost" id="btn-copy">⧉&nbsp; Kopírovat do schránky</button>
        <button class="btn" id="btn-png">⬇&nbsp; Stáhnout PNG</button>
      </div>
    </div>
  </div>
</div>

async function deriveKey(code, salt, iter){
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(code), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:iter, hash:'SHA-256'}, km,
    {name:'AES-GCM', length:256}, false, ['decrypt']);
}
async function tryDecrypt(code, blob){
  try{
    const key = await deriveKey(code, b64(blob.salt), ENC.iterations);
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(blob.iv)}, key, b64(blob.ct));
    return JSON.parse(new TextDecoder().decode(pt));
  }catch(e){ return null; }
}
async function unlock(code){
  const m = await tryDecrypt(code, ENC.master);
  if(m) return {type:'master', data:m};
  for(const s of ENC.slices){ const d = await tryDecrypt(code, s); if(d) return {type:'single', data:d}; }
  return null;
}

/* ---------- pomocné + graf (shodné s hlavním reportem) ---------- */
const czk  = v => (v==null ? "—" : v.toLocaleString('cs-CZ',{maximumFractionDigits:0})+" Kč");
const czk2 = v => Math.round(v).toLocaleString('cs-CZ');
function median(a){const s=[...a].sort((x,y)=>x-y);const n=s.length;return n?(n%2?s[(n-1)/2]:(s[n/2-1]+s[n/2])/2):0;}
function fmtNum(n){return n.length===9?n.replace(/(\d{3})(\d{3})(\d{3})/,'$1 $2 $3'):n.replace(/(\d{2})(\d{3})(\d{3})/,'$1 $2 $3');}
const REL=0.25, REL_BIG=0.50, ABS_MIN=60;
function analyze(values){
  const active=values.map((v,i)=>({v,i})).filter(o=>o.v!=null&&o.v>0);
  const base=median(active.map(o=>o.v));
  const flags=values.map(()=>null); let endedAt=null, was=false;
  values.forEach((v,i)=>{
    if(v!=null&&v>0){was=true;const dev=(v-base)/base;
      if(Math.abs(v-base)>=ABS_MIN&&Math.abs(dev)>=REL) flags[i]={sev:Math.abs(dev)>=REL_BIG?'critical':'warning',dev,dir:v>base?'up':'down'};}
    else if((v===0||v==null)&&was&&endedAt===null){endedAt=i;}
  });
  return {active:active.map(o=>o.v),base,flags,endedAt};
}
/* archivace upozornění (localStorage, per prohlížeč) */
const AKEY='tarify-share-arch';
let ARCH=(()=>{try{return new Set(JSON.parse(localStorage.getItem(AKEY)||'[]'));}catch(e){return new Set();}})();
const ak=(c,i)=>c+'|'+i;
const isArch=(c,i)=>ARCH.has(ak(c,i));
const eff=(c,i,f)=>(f&&!isArch(c,i))?f:null;
let CURRENT=null;
function toggleArch(c,i,v){
  v?ARCH.add(ak(c,i)):ARCH.delete(ak(c,i));
  try{localStorage.setItem(AKEY,JSON.stringify([...ARCH]));}catch(e){}
  if(CURRENT&&CURRENT.type==='master') renderMaster(CURRENT.data);
  else if(CURRENT) renderSingle(CURRENT.data);
}
function wireArch(root){
  root.querySelectorAll('[data-arch]').forEach(b=>b.addEventListener('click',()=>{const[c,i]=b.dataset.arch.split('|');toggleArch(c,+i,true);}));
  root.querySelectorAll('[data-unarch]').forEach(b=>b.addEventListener('click',()=>{const[c,i]=b.dataset.unarch.split('|');toggleArch(c,+i,false);}));
}
const CVAR={surface:'var(--surface)',series:'var(--series)',fill:'var(--series-fill)',grid:'var(--grid)',
  muted:'var(--muted)',text:'var(--ink)',critical:'var(--critical)',warning:'var(--warning)'};
function resolved(){const cs=getComputedStyle(document.body);const g=k=>cs.getPropertyValue(k).trim();
  return {surface:g('--surface'),series:g('--series'),fill:g('--series-fill'),grid:g('--grid'),
    muted:g('--muted'),text:g('--ink'),critical:g('--critical'),warning:g('--warning')};}
function lineChart({values,flags,months,W,H,yaxis,fill,zero,big,unit,colors}){
  const C=colors||CVAR;
  const mL=yaxis?(big?66:56):8, mR=big?26:8, mT=big?30:12, mB=big?42:16;
  const iw=W-mL-mR, ih=H-mT-mB;
  const act=values.filter(v=>v!=null&&v>0); let maxv,minv;
  if(zero){minv=0;maxv=Math.max(...act,1)*1.12;} else {maxv=Math.max(...act,1)*1.10;minv=Math.min(...act,maxv)*0.88;}
  const rng=(maxv-minv)||1, n=values.length;
  const x=i=>mL+(n<2?iw/2:i*iw/(n-1)), y=v=>mT+ih-(v-minv)/rng*ih;
  let grid='';
  if(yaxis){const T=4;for(let t=0;t<=T;t++){const val=minv+rng*t/T,yy=y(val);
    grid+=`<line x1="${mL}" x2="${W-mR}" y1="${yy}" y2="${yy}" stroke="${C.grid}" stroke-width="1"/>`+
          `<text x="${mL-8}" y="${yy+4}" text-anchor="end" fill="${C.muted}" font-size="${big?12:11}" font-family="system-ui,sans-serif">${czk2(val)}</text>`;}}
  const segs=[];let prev=null;
  values.forEach((v,i)=>{if(v!=null&&v>0){const p={x:x(i),y:y(v)};if(prev)segs.push([prev,p]);prev=p;}else prev=null;});
  const path=segs.map(s=>`M${s[0].x},${s[0].y} L${s[1].x},${s[1].y}`).join(' ');
  let area='';
  if(fill){const pts=values.map((v,i)=>(v!=null&&v>0)?`${x(i)},${y(v)}`:null).filter(Boolean).join(' ');
    if(pts) area=`<polygon points="${mL},${mT+ih} ${pts} ${x(n-1)},${mT+ih}" fill="${C.fill}"/>`;}
  let dots='';
  values.forEach((v,i)=>{if(v==null||v===0)return;const f=flags&&flags[i];
    const col=f?(f.sev==='critical'?C.critical:C.warning):C.series, rr=big?(f?7:5):(f?5:3.4);
    dots+=`<circle cx="${x(i)}" cy="${y(v)}" r="${rr}" fill="${col}" stroke="${C.surface}" stroke-width="${big?2.4:1.6}"/>`;
    if(big) dots+=`<text x="${x(i)}" y="${y(v)-13}" text-anchor="middle" fill="${C.text}" font-size="12.5" font-weight="700" font-family="system-ui,sans-serif">${czk2(v)}</text>`;});
  let xl='';months.forEach((m,i)=>{xl+=`<text x="${x(i)}" y="${H-(big?15:3)}" text-anchor="middle" fill="${C.muted}" font-size="${big?12:9}" font-family="system-ui,sans-serif">${m.label}${big?" ‘26":""}</text>`;});
  const u=unit?`<text x="${mL}" y="${big?18:8}" fill="${C.muted}" font-size="${big?12.5:9.5}" font-family="system-ui,sans-serif">${unit}</text>`:'';
  return `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" style="width:100%;height:auto;display:block" role="img">${grid}${u}${area}<path d="${path}" fill="none" stroke="${C.series}" stroke-width="${big?3:2.2}" stroke-linecap="round" stroke-linejoin="round"/>${dots}${xl}</svg>`;
}

/* ---------- pohled JEDNOHO čísla ---------- */
function renderSingle(d){
  const r=d.row, months=d.months, a=analyze(r.values), ann=d.ann||{};
  const ef=a.flags.map((f,i)=>eff(r.cislo,i,f));
  const avg=a.active.length?a.active.reduce((x,y)=>x+y,0)/a.active.length:0;
  const mn=a.active.length?Math.min(...a.active):0, mx=a.active.length?Math.max(...a.active):0;
  const nm=r.nazev||fmtNum(r.cislo);
  const chart=lineChart({values:r.values,flags:ef,months,W:820,H:380,yaxis:true,fill:false,zero:false,big:true,unit:'Kč bez DPH'});
  // řádek tabulky = měsíce
  let rows=months.map((m,i)=>{const v=r.values[i];const f=ef[i];
    let cls='',txt;
    if(v==null)txt='—',cls='off'; else if(v===0)txt='ukončeno',cls='off';
    else {txt=czk2(v)+(f?` <span class="badge">${f.dir==='up'?'▲':'▼'}</span>`:''); cls=f?(f.sev==='critical'?'cc':'cw'):'';}
    return `<tr><td class="l">${m.label} ‘26</td><td class="${cls}">${txt}</td></tr>`;}).join('');
  // příčina / upozornění (s možností archivace)
  let causeHtml='';
  const crit=ef.map((f,i)=>({f,i})).filter(o=>o.f).sort((p,q)=>(q.f.sev==='critical')-(p.f.sev==='critical')||q.i-p.i)[0];
  const archCrit=a.flags.map((f,i)=>({f,i})).filter(o=>o.f&&isArch(r.cislo,o.i));
  if(a.endedAt!=null){causeHtml=`<div class="cause info">Služba byla ukončena od ${months[a.endedAt].label} ‘26.</div>`;}
  else if(crit){const f=crit.f,m=months[crit.i],an=ann[m.key];
    causeHtml=`<div class="cause"><b>${f.dir==='up'?'⚠ Nárůst':'Pokles'}</b> v ${m.label} ‘26 na <b>${czk(r.values[crit.i])}</b> (${f.dev>0?'+':''}${(f.dev*100).toFixed(0)} % vs. obvyklých ${czk(a.base)}).${an?` 🔍 ${an}`:''}
      <div style="margin-top:8px"><button class="mini-btn" data-arch="${ak(r.cislo,crit.i)}">✓ Vyřešeno / archivovat</button></div></div>`;}
  else if(archCrit.length){causeHtml=`<div class="cause" style="opacity:.7">Upozornění archivováno. <button class="mini-btn" data-unarch="${ak(r.cislo,archCrit[0].i)}">↩ Obnovit</button></div>`;}
  document.getElementById('view').innerHTML=`
    <div class="topbar"><div class="tag">Váš přehled · ${d.generated}</div><button class="lockbtn" onclick="location.reload()">🔒 Odhlásit</button></div>
    <div class="chart-card">
      <div class="head"><div><div class="name">${nm}</div><div class="tarif">${r.tarif||(r.kind==='internet'?'Pevný internet':'')}</div></div><div class="num">${fmtNum(r.cislo)}</div></div>
      <div class="zoomable" id="single-chart" title="Kliknutím zvětšíte" style="margin-top:8px"><div class="zoomhint">⤢ zvětšit</div>${chart}</div>
      <div class="stats"><span>Ø <b>${czk(avg)}</b></span><span>min <b>${czk(mn)}</b></span><span>max <b>${czk(mx)}</b></span></div>
      ${causeHtml}
    </div>
    <h2>Platby po měsících (Základ DPH)</h2>
    <table><thead><tr><th class="l">Měsíc</th><th>Kč bez DPH</th></tr></thead><tbody>${rows}</tbody>
      <tfoot><tr><td class="l">Průměr</td><td>${czk2(avg)}</td></tr></tfoot></table>`;
  wireArch(document.getElementById('view'));
  const sc=document.getElementById('single-chart');
  if(sc) sc.addEventListener('click',()=>openModal(`${nm}${r.nazev?` <span class="m-num">${fmtNum(r.cislo)}</span>`:''}`,
    `${r.tarif||(r.kind==='internet'?'Pevný internet':'')} · Ø <b>${czk(avg)}</b> · min <b>${czk(mn)}</b> · max <b>${czk(mx)}</b>`,
    bigNumberSvg(r,ef,months), 'graf-'+nm));
}

/* ---------- pohled OWNER (celý přehled) ---------- */
function renderMaster(d){
  const months=d.months, rows=d.rows, ann=d.annotations||{};
  const per=months.map((m,i)=>rows.reduce((s,r)=>s+(r.values[i]||0),0));
  const total=per.reduce((a,b)=>a+b,0);
  const An=rows.map(r=>({r,a:analyze(r.values)}));
  // overview
  const ov=lineChart({values:per,flags:null,months,W:880,H:340,yaxis:true,fill:true,zero:true,big:true,unit:'Kč bez DPH'});
  // alerts: aktivní vs archivované
  const active=[],archd=[];
  An.forEach(({r,a})=>a.flags.forEach((f,i)=>{if(!f)return;(isArch(r.cislo,i)?archd:active).push({r,a,i,f});}));
  const srt=arr=>arr.sort((x,y)=>((y.f.sev==='critical')-(x.f.sev==='critical'))||y.i-x.i);
  srt(active);srt(archd);
  const arow=(it,arch)=>{const m=months[it.i],an=(ann[it.r.cislo]||{})[m.key];
    const btn=arch?`<button class="mini-btn" data-unarch="${ak(it.r.cislo,it.i)}">↩ Obnovit</button>`
                  :`<button class="mini-btn" data-arch="${ak(it.r.cislo,it.i)}">✓ Vyřešeno</button>`;
    return `<div class="arow ${arch?'arch':(it.f.sev==='critical'?'c':'w')}"><div class="ic">${it.f.dir==='up'?'↑':'↓'}</div>
      <div class="body"><b>${it.r.nazev||fmtNum(it.r.cislo)}</b> <span class="tag">${fmtNum(it.r.cislo)}</span><br>
      <span class="tag">${it.f.sev==='critical'?'Velký ':''}${it.f.dir==='up'?'nárůst':'pokles'} v ${m.label} ‘26 · ${it.f.dev>0?'+':''}${(it.f.dev*100).toFixed(0)} % vs. obvyklých ${czk(it.a.base)}.${an?` 🔍 ${an}`:''}</span></div>
      <div class="side"><div class="amt">${czk(it.r.values[it.i])}</div>${btn}</div></div>`;};
  const alertsHtml=active.length?active.map(it=>arow(it,false)).join(''):`<div class="tag">${archd.length?'Všechna upozornění vyřešená a archivovaná. ✓':'Žádné výrazné výkyvy.'}</div>`;
  const archHtml=archd.length?`<details class="arch-box"><summary>Archivováno — vyřešená (${archd.length})</summary><div class="alerts" style="margin-top:12px">${archd.map(it=>arow(it,true)).join('')}</div></details>`:'';
  // table
  const grp={mobil:'Mobilní čísla',internet:'Pevný internet'};let body='';
  ['mobil','internet'].forEach(k=>{const rs=An.filter(o=>o.r.kind===k);if(!rs.length)return;
    body+=`<tr class="grp"><td colspan="${months.length+2}">${grp[k]}</td></tr>`;
    rs.forEach(({r,a})=>{const nm=r.nazev?`${r.nazev} <span class="tag">${fmtNum(r.cislo)}</span>`:fmtNum(r.cislo);
      let cells=r.values.map((v,i)=>{if(v==null)return `<td class="off">—</td>`;if(v===0)return `<td class="off">ukončeno</td>`;
        const f=eff(r.cislo,i,a.flags[i]);return `<td class="${f?(f.sev==='critical'?'cc':'cw'):''}">${czk2(v)}${f?` <span class="badge">${f.dir==='up'?'▲':'▼'}</span>`:''}</td>`;}).join('');
      const avg=a.active.length?a.active.reduce((s,v)=>s+v,0)/a.active.length:0;
      body+=`<tr><td class="l">${nm}</td>${cells}<td>${czk2(avg)}</td></tr>`;});});
  const foot=`<tfoot><tr><td class="l">Celkem</td>${per.map(v=>`<td>${czk2(v)}</td>`).join('')}<td>${czk2(total/months.length)}</td></tr></tfoot>`;
  const thead=`<thead><tr><th class="l">Číslo</th>${months.map(m=>`<th>${m.label} ‘26</th>`).join('')}<th>Průměr</th></tr></thead>`;
  // cards
  const cards=An.map(({r,a},idx)=>{const ef=a.flags.map((f,i)=>eff(r.cislo,i,f));
    const sp=lineChart({values:r.values,flags:ef,months,W:300,H:76,yaxis:false,fill:false,zero:false,big:false});
    const avg=a.active.length?a.active.reduce((s,v)=>s+v,0)/a.active.length:0;
    return `<div class="ncard zoomable ${ef.some(Boolean)?'fl':''}" data-idx="${idx}" title="Kliknutím zvětšíte"><div class="zoomhint">⤢ zvětšit</div><div class="head"><div class="nm">${r.nazev||fmtNum(r.cislo)}</div><div class="nn">${fmtNum(r.cislo)}</div></div>
      <div style="margin-top:6px">${sp}</div><div class="unit">Kč bez DPH</div><div class="stats"><span>Ø <b>${czk(avg)}</b></span></div></div>`;}).join('');
  document.getElementById('view').innerHTML=`
    <div class="topbar"><div><h1>Přehled tarifů — telefonní čísla</h1><div class="tag">Úplný přehled (owner) · ${d.generated}</div></div><button class="lockbtn" onclick="location.reload()">🔒 Odhlásit</button></div>
    <div class="chart-card"><b>Vývoj celkové platby</b> — celkem ${czk(total)}, průměr ${czk(total/months.length)}/měsíc<div class="zoomable" id="ov-chart" title="Kliknutím zvětšíte" style="margin-top:8px"><div class="zoomhint">⤢ zvětšit</div>${ov}</div></div>
    <h2>Upozornění na výkyvy</h2><div class="alerts">${alertsHtml}</div>${archHtml}
    <h2>Přehledová tabulka (Základ DPH, Kč)</h2><table>${thead}<tbody>${body}</tbody>${foot}</table>
    <h2>Jednotlivá čísla</h2><div class="grid">${cards}</div>`;
  wireArch(document.getElementById('view'));
  const ovc=document.getElementById('ov-chart');
  if(ovc) ovc.addEventListener('click',()=>openModal('Vývoj celkové platby',
    `Celkem <b>${czk(total)}</b> · průměr <b>${czk(total/months.length)}</b>/měsíc`, bigOverviewSvg(per,months), 'prehled-celkova-platba'));
  document.querySelectorAll('#view .ncard').forEach(el=>el.addEventListener('click',ev=>{
    if(ev.target.closest('.mini-btn'))return;
    const {r,a}=An[+el.dataset.idx]; const ef=a.flags.map((f,i)=>eff(r.cislo,i,f));
    const avg=a.active.length?a.active.reduce((s,v)=>s+v,0)/a.active.length:0;
    openModal(`${r.nazev||fmtNum(r.cislo)}${r.nazev?` <span class="m-num">${fmtNum(r.cislo)}</span>`:''}`,
      `${r.tarif||(r.kind==='internet'?'Pevný internet':'')} · Ø <b>${czk(avg)}</b>`, bigNumberSvg(r,ef,months), 'graf-'+(r.nazev||r.cislo));
  }));
}

/* ---------- zvětšení grafu + export PNG / schránka ---------- */
const modal=document.getElementById('modal'), modalChart=document.getElementById('modal-chart'),
  modalTitle=document.getElementById('modal-title'), modalSub=document.getElementById('modal-sub');
let currentFile='graf';
function sanitize(s){return s.replace(/[\\/:*?"<>|\s]+/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'');}
function openModal(titleHtml, subHtml, svg, fileBase){
  modalTitle.innerHTML=titleHtml; modalSub.innerHTML=subHtml; modalChart.innerHTML=svg;
  currentFile=sanitize(fileBase)+'.png'; modal.hidden=false;
}
function closeModal(){modal.hidden=true; modalChart.innerHTML='';}
document.getElementById('modal-close').addEventListener('click',closeModal);
modal.addEventListener('click',e=>{if(e.target===modal)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&!modal.hidden)closeModal();});
function makePNG(cb){
  const svgEl=modalChart.querySelector('svg'); if(!svgEl)return;
  const W=svgEl.viewBox.baseVal.width, H=svgEl.viewBox.baseVal.height, scale=2;
  const xml=new XMLSerializer().serializeToString(svgEl);
  const src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(xml)));
  const img=new Image();
  img.onload=()=>{const c=document.createElement('canvas'); c.width=W*scale; c.height=H*scale;
    const ctx=c.getContext('2d'); ctx.fillStyle=resolved().surface; ctx.fillRect(0,0,c.width,c.height);
    ctx.drawImage(img,0,0,c.width,c.height); c.toBlob(b=>cb(b),'image/png');};
  img.onerror=()=>alert('Vykreslení grafu se nezdařilo.'); img.src=src;
}
function flash(btn,msg,err){const old=btn.dataset.old||btn.innerHTML; btn.dataset.old=old; btn.innerHTML=msg;
  btn.style.borderColor=err?'var(--critical)':'#0ca30c';
  setTimeout(()=>{btn.innerHTML=old; btn.style.borderColor=''; btn.dataset.old='';},1700);}
document.getElementById('btn-png').addEventListener('click',()=>{
  makePNG(b=>{const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=currentFile;
    document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);});
});
document.getElementById('btn-copy').addEventListener('click',e=>{
  const btn=e.currentTarget;
  if(!navigator.clipboard||!window.ClipboardItem){flash(btn,'Schránka nedostupná',true);return;}
  makePNG(b=>{navigator.clipboard.write([new ClipboardItem({'image/png':b})]).then(()=>flash(btn,'✓ Zkopírováno')).catch(()=>flash(btn,'Nepodařilo se',true));});
});
function bigOverviewSvg(per,months){return lineChart({values:per,flags:null,months,W:880,H:400,yaxis:true,fill:true,zero:true,big:true,unit:'Kč bez DPH',colors:resolved()});}
function bigNumberSvg(r,flags,months){return lineChart({values:r.values,flags,months,W:820,H:400,yaxis:true,fill:false,zero:false,big:true,unit:'Kč bez DPH',colors:resolved()});}

/* ---------- ovládání zámku ---------- */
const form=document.getElementById('lock-form'), input=document.getElementById('code'),
  btn=document.getElementById('unlock-btn'), err=document.getElementById('err');
form.addEventListener('submit', async e=>{
  e.preventDefault();
  const code=input.value.trim();
  if(!code){return;}
  btn.disabled=true; btn.textContent='Ověřuji…'; err.textContent='';
  let res=null;
  try{ res=await unlock(code); }catch(ex){ err.textContent='Prohlížeč nepodporuje dešifrování (zkuste jiný / novější).'; btn.disabled=false; btn.textContent='Zobrazit'; return; }
  if(!res){ err.textContent='Neplatný kód.'; btn.disabled=false; btn.textContent='Zobrazit'; input.select(); return; }
  document.getElementById('lock').hidden=true;
  document.getElementById('view').hidden=false;
  const foot=document.getElementById('foot'); foot.hidden=false;
  foot.textContent='Data jsou šifrovaná (AES‑GCM). Zobrazují se jen údaje odpovídající zadanému kódu.';
  CURRENT=res;
  if(res.type==='master') renderMaster(res.data); else renderSingle(res.data);
  window.scrollTo(0,0);
});
input.focus();
